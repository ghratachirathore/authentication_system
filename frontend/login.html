<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Login
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="container">

        <form
            class="form"
            id="loginForm">

            <h1>
                Login
            </h1>

            <div class="input-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    id="loginEmail"
                    required>

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    id="loginPassword"
                    required>

            </div>

            <button
                type="submit"
                class="btn">

                Login

            </button>

            <p>

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </p>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
